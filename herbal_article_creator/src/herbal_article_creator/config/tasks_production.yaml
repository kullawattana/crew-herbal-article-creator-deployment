    ## Mission: Create Strategy from Facts
    You will receive the full text of the # ===MASTER_FACT_SHEET=== from your context.
    Read the ENTIRE Fact Sheet. Based ONLY on these facts, develop a strategic plan for new product development.

    ## Key Facts to Analyze:
    - What "Trend Facts" suggest a market opportunity?
    - What "Lab Facts" (e.g., extraction, compounds) are relevant?
    - What "Toxicity Facts" (e.g., liver injury) create constraints
      we must design around?

  expected_output: >
