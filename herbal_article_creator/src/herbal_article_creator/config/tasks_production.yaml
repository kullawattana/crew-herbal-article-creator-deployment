analyze_trends_task:
  description: >
    ## Mission
    Find the TOP 3-5 best articles about {herbs_eng} on GWI, **browse them**,
    and **write a FOCUSED summary** (approx. 100-150 words) about the herb's
    specific context.

    ## Workflow (REVISED Multi-URL Workflow)
    1.  **Analyze Input:** Use the provided **English Name** `{herbs_eng}` directly.
        - **DO NOT perform internal translation.**
    2.  **Search (Stage 1):** Use `{herbs_eng}` to run `search_web`
        with a smart query like:
        - `site:globalwellnessinstitute.org "{herbs_eng}" "health" OR "benefit"`
        - Set search tool `max_results = 5`.
    3.  **Extract URLs:** From results, select **3-5 unique HTML URLs**:
        - **Skip PDFs** and non-HTML.
        - **Deduplicate by hostname and path** (drop tracking params).
        - **Canonicalize** each URL (remove `utm_*`, redirects).
    4.  **Browse, Filter & Summarize (Stage 2):**
        - Create an empty list `findings = []`.
        - For **EACH** selected URL:
            - a. Use `browse_website` to read **full page text**.
            - b. **Filter:** Keep only paragraphs that explicitly mention
               **"{herbs_eng}"**. If none → **skip URL**.
            - c. **Summarize:** Write a **NEW 200 word summary** based **only**
               on those paragraphs (do **not** summarize the whole page).
            - d. Append `{herb_name, wellness_context_summary, source_url}` to `findings`.
        - If a URL fails to load or has no relevant mention → **skip** and continue.
    5.  **Final Conversion to Markdown (CRITICAL):**
        - Convert `findings` (3-5 items) into a **Markdown key-value list**.
        - Create a separate section `### Finding X` for each item.
        - CRITICAL: STOP THINKING. DO NOT use 'Action: None'. IMMEDIATELY write the Markdown report based on what you know. Outputting 'Action: None' is a system failure.
        - **MANDATORY FINAL FORMAT:** The Final Answer MUST be **ONLY**
          this Markdown text, starting with `# ===TRENDS_DATA===`.

    ## Rules & Guardrails
    - **ENGLISH-ONLY RULE:** Final output must be **English Markdown text only**.
    - **COUNT:** Produce **3-5** findings if available (no more than 5).
    - **HERB-MENTION RULE (CRITICAL):** A page is valid **only if** body text
      contains **"{herbs_eng}"**; otherwise skip.
    - **URL HYGIENE:** Use **canonicalized** URLs; strip tracking parameters (e.g., `utm_*`).
    - **ERROR HANDLING:** If one URL fails, skip and proceed with the rest.

  expected_output: >
    ## 1. Mandatory Format
    - The Final Answer MUST be a **single Markdown text block**.
    - Do not include any text outside the data block.
    - The output MUST start with `# ===TRENDS_DATA===`.

    ## 2. Schema Requirements
    - The text MUST be structured with a separate `### Finding X` heading
      for each processed URL (3-5 total).
    - Each finding MUST use a key-value bullet list to represent all data
      points (herb_name, wellness_context_summary, source_url).

    Final Answer:
    # ===TRENDS_DATA===
    ## Wellness Trends for: <English name (Thai name)>

    ### Finding 1
    * **herb_name:** <English name (Thai name)>
    * **wellness_context_summary:** <A newly written, original summary (approx 100-150 words) 
      based *only* on the specific paragraphs that mention the herb.>
    * **source_url:** <The exact canonical URL of the GWI article 1>

    ### Finding 2
    * **herb_name:** <English name (Thai name)>
    * **wellness_context_summary:** <A newly written, original summary (approx 100-150 words) 
      based *only* on the specific paragraphs that mention the herb.>
    * **source_url:** <The exact canonical URL of the GWI article 2>

    ### Finding 3
    * **herb_name:** <English name (Thai name)>
    * **wellness_context_summary:** <...>
    * **source_url:** <Canonical URL of GWI article 3>

    <!-- If available, continue up to Finding 5 -->

  agent: trend_analyst_agent

laboratory_data_task:
  description: >
    ## Mission: Retrieve Lab Evidence for {herbs_thai}
    Use Pinecone to retrieve **experimentally-based snippets** from internal herbal PDFs Knowledge Base,
    and generate a structured Markdown summary focusing ONLY on lab evidence clearly related to `{herbs_thai}`.

    ## Workflow:
    1. **Analyze Input:**
       - Use the provided **Thai Name** `{herbs_thai}` directly.
       - Use the provided **English/Scientific Name** `{herbs}`.
       - **Do NOT perform any internal translation.**

    2. **Pinecone Retrieval (Dual-Language Strategy)**
       - **Search 1:** Call `search_pinecone` with the Thai query: "{herbs_thai}".
       - **Search 2:** Call `search_pinecone` with the English/Scientific query: "{herbs}".
       - *Reason:* Lab data (HPLC, GC-MS, Compounds) often appears in English or uses scientific names within Thai documents.
       - Use high `top_k` (e.g., 15) for both to ensure coverage.

    3. **Filter Snippets:**
       - Carefully check if the experiment described is **explicitly about {herbs_thai}** OR **{herbs}**.
       - Look for technical keywords (e.g., "Extraction", "Yield", "HPLC", "TLC") even if the surrounding text is Thai.
       - If **no relevant snippets are found**, you MUST still output the Markdown header with a "None found" note.

    4. Read the returned snippets carefully.

    5. **Extract and Structure:**
       - For relevant snippets, extract the following:
         - **experimental_methods**
         - **identified_compounds**
         - **chromatography_details**
         - **extraction_methods**
         - **pharmacological_findings**
         - **cosmetic_or_clinical_snippets**
         - **quality_control_observations**
         - **notes**
       - Add: **linkage_to_target_herb** (Verify connection to {herbs_thai}/{herbs})

    6. **Output Format (MANDATORY):**
       - **CRITICAL: DO NOT stop at "Action: None". You MUST output the Markdown text.**
       - Format as Markdown starting with `# ===LAB_DATA===`.
       - Include `source_file`, `page_number`, and optionally `snippet_hash`

  expected_output: >
    # ===LAB_DATA===
    ## Internal Lab Evidence for: <thai_name> / <english_name>

    * **main_sources:**
      * <17_TurmericExtraction.pdf (p.5)>
      * <12_TCM_TurmericStudy.pdf (p.3)>

    * **linkage_to_target_herb:**
      * <TLC and GC-MS performed on ethanol extract of turmeric rhizome (เหง้าขมิ้น)>
      * <Curcumin and turmerone detected in turmeric oil sample (from ขมิ้นชัน)>

    * **experimental_methods:**
      * <TLC: silica gel F254, solvent hexane:ethyl acetate 7:3>
      * <Extraction: 95% ethanol maceration for 7 days, filtered and evaporated>

    * **identified_compounds:**
      * <Curcumin (TLC band hRf 41)>
      * <Turmerone (GC-MS major peak at RT=12.5 min)>

    * **chromatography_details:**
      * <TLC: 3 bands detected, Rf 0.41 (yellow), 0.56, 0.72>
      * <GC-MS: Peaks identified via NIST database match>

    * **pharmacological_findings:**
      * <Antibacterial activity against Staph. aureus (zone of inhibition: 14 mm)>

    * **quality_control_observations:**
      * <No contaminants detected, ethanol yield: 12.3% w/w>

    * **notes:**
      * <Study suggests turmeric extract has potential for topical antibacterial formulation>

  agent: herbal_laboratory_agent

research_evidence_task:
  description: >
    ## Mission
    Find up to 3 scientific studies for **{herbs}** from PubMed,
    extract key data, and build a **structured Markdown report**.

    ## Workflow (REVISED - Linear Process)
    1.  **Analyze Input:**
        - Use the provided **English Name** `{herbs}` (e.g., "Turmeric") as the PRIMARY search term.
        - **DO NOT perform internal translation.**

    2.  **Search PubMed:**
        - Call `pubmed_search` using the query: **"{herbs}"**.

    3.  **Select PMIDs:**
        - From the search results, select the **TOP 3 most relevant PMIDs**.
        - If fewer than 3 are found, use all of them.

    4.  **Iterate, Fetch, and Parse (CRITICAL LOOP):**
        - Create an empty list `studies_data = []`.
        - For **EACH** PMID selected in Step 3:
            - a. Call `pubmed_fetch(pmid=<the_pmid>)`.
            - b. Call `pubmed_parse(data=<output_from_fetch>)`.
            - c. **Check the output of `pubmed_parse`:**
                - **IF `parse_status == "fallback-text"`:**
                    - **Extract ONLY `abstract_raw`.**
                    - **Set ALL other fields to `"not_found"`.**
                - **ELSE IF `parse_status` is not "fallback-text":**
                    - **Extract ALL fields normally:**
                        - `abstract_raw` (verbatim)
                        - `key_findings` (6-sentence summary)
                        - `citation_apa` (verbatim)
                        - `pmid`
                        - `canonical_url`
                        - `herb_name`, `herb_name_scientific`
                        - `compound_name`, `mechanism_name`
            - d. If a field is missing, set it to `"not_found"`.
            - e. Append this structured data to the `studies_data` list.

    5.  **Compile Final Report (MANDATORY FINAL STEP):**
        - Once the loop in Step 4 is complete:
        - Compile the **FINAL** Markdown report using `studies_data`.
        - **CRITICAL: DO NOT stop at "Action: None". You MUST output the Markdown text.**
        - Your Final Answer MUST be ONLY this Markdown text.

  expected_output: >
    A single Markdown text block starting with # ===RESEARCH_DATA===
    
    Final Answer:
    # ===RESEARCH_DATA===
    ## Scientific Evidence for: <English name>
    
    * **herb_name:** <English name>
    * **herb_name_scientific:** <e.g., Curcuma longa or 'not_found'>
    
    ### Validated Compounds
    
    * **Compound 1:**
        * **compound_name:** <e.g., Curcumin or 'not_found'>
        * **mechanism_name:** <e.g., Anti-inflammatory or 'not_found'>
        * **supporting_studies:**
            * **Study 1:** (Data from the first item in studies_data)
                * **study_type:** <RCT, Review, or 'not_found'>
                * **abstract_raw:** <Full abstract text...>
                * **key_findings:** <A 6 sentence summary...>
                * **pmid:** <PubMed ID or 'not_found'>
                * **canonical_url:** <https://doi.org/10.xxxx or 'not_found'>
                * **citation_apa:** <Verbatim APA citation...>
            * **Study 2:** (Data from the second item...)
                * ...
            * (Up to 3 studies)

    ### Overall Summary
    * **summary:** <Summary text or 'not_found'>

  agent: research_agent

check_compliance_task:
  description: >
    ## Mission
    Investigate the **Thai FDA** regulatory status for {herbs_thai}. You must
    **browse** the Thai FDA website to find *specific registration numbers*
    (e.g., เลขสารบบอาหาร) and format them as a **Markdown report**.

    ## Workflow
    1.  **Analyze Inputs & Define Names:**
        a.  Set **Thai Name** = `{herbs_thai}` (e.g., "ขมิ้นชัน").
        b.  **Set English Name:** Use the provided `{herbs}` variable directly (e.g., "Turmeric").
            * **DO NOT** use `search_web` to translate. Use the input variable strictly.

    2.  **Construct Target URL (Stage 1):**
        - **CRITICAL:** You **MUST** use the **Thai Name** (defined in 1a) to construct the primary search URL, as the FDA index is Thai-based.
        - **URL 1 (FDA Portal):** `https://www.fda.moph.go.th/?cate=DATA_ALL&type=&fi=1&ww={herbs_thai}`
        - Create empty lists for `food_registrations` to store information.

    3.  **Browse & Extract from Portals (Stage 2):**
        - **Action 1 (Browse FDA Portal):** Call `browse_website_tool` using **URL 1**.
        - Take the **FULL** text content from the output of **Action 1**.

    4.  **Compile Final Report (MANDATORY FINAL STEP):**
        - **Extraction and Formatting:** Scan the text content from Step 3 and extract **up to 5** of the most relevant registration numbers found (for both Food and Drug). 
          If you find more than 5, select the top 5. If you find fewer than 5 (or zero), you MUST report all that you find. If zero, you MUST report 'None found'.
        - **Translate Findings:** Translate all extracted Thai product names/statuses to English.
        - **Compile Markdown:** Compile all findings into the final **structured Markdown
          key-value list** using the **English Name** (from 1b) in the `herb_name` field, following the `expected_output` schema.
        - **FINAL OUTPUT PATH (CRITICAL EXECUTION):**
          - The final process of extraction and formatting **MUST** transition **IMMEDIATELY** to the `Final Answer:` line.
          - **CRITICAL: STOP THINKING. DO NOT use 'Action: None'. IMMEDIATELY write the Markdown report based on what you know.**
          - Your Final Answer MUST be **ONLY** the Markdown text, starting with `# ===COMPLIANCE_DATA===`.
          
    ## Rules & Guardrails
    
    ### 1. Language Rules
    - **ENGLISH-ONLY RULE:** Final output must be **English Markdown text** only.
    - Translate all Thai text from FDA pages (and {herbs_thai}) to English.
    - `herb_name` in the output MUST be the English name (found in Step 1b).

    ### 2. Tool Use Rules
    - **Allowed tool:** Your ONLY available tool is `browse_website_tool`.
    - You MUST use this tool to execute the browsing steps in the Workflow.
    - Do NOT type "Action: None".
    - 1 Action = 1 Tool = 1 JSON object.

    ### 3. Data & Link Rules
    - Use only canonical URLs from `fda.moph.go.th`.
    - **If no data is found** for a list (e.g., food_registrations), you MUST write `* None found.` under the relevant heading.
    - **DO NOT FABRICATE DATA (ห้ามโกหก).** If you cannot find a registration number in the text, do not invent one.

    ### 4. CRITICAL: Anti-Hallucination Rule
    - The Markdown data in `expected_output` is a **TEMPLATE ONLY**.
    - You MUST NOT copy the placeholder values (e.g., "G 123/45", "<Product name...") into your final answer.
    - **If your browsing finds no registration numbers, you MUST write `* None found.`**
    - Copying example data is a critical failure.

  expected_output: >
    ## 1. Mandatory Format
    - The Final Answer **must be a single Markdown text block only**.
    - Do not include any text outside the data block.
    - The output MUST start with `# ===COMPLIANCE_DATA===`.

    ## 2. Schema Requirements
    - The text MUST be structured as a nested key-value bullet list.
    - All fields from the original JSON structure MUST be present as keys.
    - **If no data is found** for a list (e.g., food_registrations), you MUST write `* None found.` under the relevant heading.
    
    Final Answer:
    # ===COMPLIANCE_DATA===
    ## Thai FDA Status for: <English Name, e.g., Turmeric>
    
    * **herb_name:** <English Name, e.g., Turmeric>

    ### Food Registrations
    * **Food Registration 1:**
        * **registration_number:** <13-digit number found on page or 'Not found'>
        * **product_name:** <Product name found on page or 'Not found'>
        * **company_name:** <company name found on page or 'Not found'>
        * **status:** <status found on page or 'Not found'>
    * **Food Registration 2:**
        * ...
    * (If empty: * None found.)

  agent: compliance_checker_agent

find_safety_data_task:
  description: >
    ## Mission
    Investigate international safety data for {herbs} AND **parse the 'Drug Facts' label**
    from the first valid source found (e.g., DailyMed) using a 
    multi-source web search and router-based extraction.

    ## Workflow
    1.  **Analyze Input:** Use the provided **English Name** `{herbs}` directly.
        - **DO NOT perform internal translation.**

    2.  **Search (Stage 1, FOCUSED Query):**
        - Using `{herbs}`, run `search_web` with **ONLY** this query:
            a. "{herbs} FDA site:dailymed.nlm.nih.gov"
        - Set `max_results = 5` for each query and collect all URLs.

    3.  **URL Filtering (Trend-Style):** (Unchanged)
        - From the combined list, select **3-5 high-quality URLs**.
        - **Rules:** Skip PDFs, Keep HTML, Deduplicate, Canonicalize URLs.

    4.  **Browse & Extract (Router Mode):** (Unchanged)
        - Attempt browsing each URL in order using `browse_website_tool`.
        - **Stop at First Valid Page:** If a page returns valid text > 500 characters, stop immediately. This content becomes `portal_text`.
        - **Failure:** If all URLs fail, set `portal_text = ""`.

    5.  **Compile Final Report (UPDATED EXTRACTION):**
        - **Parse Drug Facts:** Scan ONLY the `portal_text` for "Drug Facts" information.
        - **Mandatory Extraction:** You MUST find and extract the text for these
          specific fields:
          - Active Ingredients
          - Purpose
          - Uses
          - Warnings
          - Directions
          - Other information
          - Inactive Ingredients
        - If a field is not found in the text, you MUST report 'Not found' for that key.
        - **CRITICAL: DO NOT stop at "Action: None". You MUST output the Markdown text.**
          
    ## Rules & Guardrails
    - **Allowed Tools:** `search_web`, `browse_website_tool`
    - **ENGLISH-ONLY RULE:** Final output must be English Markdown text.
    - **DO NOT FABRICATE DATA.**

  expected_output: >
    A Markdown report structured *exactly* like the DailyMed 'Drug Facts' label.

    Final Answer:
    # ===SAFETY_DATA===
    ## International Safety Data for: <English Name>
    
    * **herb_name:** <English Name>
    * **source_browsed:** <The single canonical URL that was successfully browsed or 'None'>

    ### Drug Facts Label
    
    * **active_ingredients:**
        * **Ingredient 1:**
            * **name:** <e.g., Dimethicone>
            * **strength:** <e.g., 3%>
            * **purpose:** <e.g., Skin Protectant or 'Not found'>
        * (If empty: * None found.)
    * **uses:** <Full text from 'Uses' section or 'Not found'>
    * **warnings:** <Full text from 'Warnings' section (e.g., For external use only...) or 'Not found'>
    * **directions:** <Full text from 'Directions' section (e.g., After cleansing...) or 'Not found'>
    * **other_information:** <Full text from 'Other information' section (e.g., store in a cool dry place...) or 'Not found'>
    * **inactive_ingredients:** <Full text from 'Inactive Ingredients' section (e.g., Aqua, Paraffinum Liquidum...) or 'Not found'>
    * **questions:** <Full text from 'Questions?' section (e.g., Email us:...) or 'Not found'>

  agent: safety_inspector_agent

find_clinical_toxicity_task:
  description: >
    ## Mission
    Investigate clinical toxicity, safety summaries, and case reports
    (e.g., liver injury) for {herbs} using targeted searches on NIH
    (NCBI Books, LiverTox, PubMed).

    ## Workflow
    1.  **Analyze Input:** Use the provided **English Name** `{herbs}` directly.
        - **DO NOT perform internal translation.**

    2.  **Search (Stage 1, FOCUSED Query):**
        - Using `{herbs}`, run `search_web` with **ONLY** these queries:
          
          a. "{herbs} safety site:ncbi.nlm.nih.gov/books"
          b. "{herbs} toxicity site:ncbi.nlm.nih.gov"
          c. "{herbs} LiverTox site:ncbi.nlm.nih.gov/books"

        - Set `max_results = 5` for each query and collect all URLs.

    3.  **URL Filtering (Trend-Style):**
        - Select 3-5 high-quality, canonical HTML URLs.
        - Rules: Skip PDFs, Keep HTML, Deduplicate, Canonicalize.

    4.  **Browse & Extract (Router Mode):**
        - Attempt browsing each URL in order using `browse_website_tool`.
        - Stop at the first valid page (> 500 chars) and store its content in `portal_text`.
        - If all URLs fail, set `portal_text = ""`.

    5.  **Compile Final Report (NEW EXTRACTION):**
        - Scan ONLY the `portal_text` for clinical toxicity summaries.
        - Extract key findings related to safety and toxicology.
        - CRITICAL: STOP THINKING. DO NOT use 'Action: None'. IMMEDIATELY write the Markdown report based on what you know. Outputting 'Action: None' is a system failure.
        
    ## Rules & Guardrails
    - Allowed Tools: `search_web`, `browse_website_tool`
    - ENGLISH-ONLY RULE: Final output must be English Markdown text.

  expected_output: >
    A Markdown report focused on clinical and toxicity summaries (e.g., LiverTox data).

    Final Answer:
    # ===TOXICITY_DATA===
    ## Clinical Toxicity Data for: <English Name>
    * **herb_name:** <English Name>
    * **source_browsed:** <The single canonical URL that was successfully browsed or 'None'>

    ### Clinical Summary
    * **toxicity_summary:** <A 200 word summary of the overall safety/toxicity profile, e.g., hepatotoxicity findings from LiverTox, or 'Not found'>
    * **mechanism_of_injury:** <Summary of the described mechanism, e.g., 'Mitochondrial damage' or 'Not found'>
    * **reported_side_effects:** <Bulleted list of side effects mentioned, e.g., 'Nausea, dermatitis, rash' or 'Not found'>
    * **case_report_summary:** <Summary of human case reports, e.g., 'Case reports of liver injury in 5 patients...' or 'Not found'>

  agent: clinical_toxicologist_agent

