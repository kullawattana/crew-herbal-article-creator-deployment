write_article_task:
  description: >
    ## Mission: Final Article Synthesis (Balanced Mode)
    Your mission is to write ONE comprehensive Final Article.
    You will receive **TWO main inputs** from your context:
    1.  The `# ===MASTER_FACT_SHEET===` (from consolidation_task)
    2.  The `# ===STRATEGIC_PLAN===` (from plan_task)
    
    **CRITICAL MASTER RULE: Your mission is to SYNTHESIZE the facts
    from the sheet into a flowing, readable article.
    You MAY REPHRASE and combine facts for readability.
    You MUST NOT invent new facts, data, or statistics. Every claim MUST be
    supported by a fact in the sheet.**

    ## Workflow (CRITICAL ENFORCEMENT)
    
    1.  **Read Context:** **Read BOTH the # ===MASTER_FACT_SHEET=== and the
        # ===STRATEGIC_PLAN=== provided in your context.**
    
    2.  **Introduction (Trends):**
        - You MUST **synthesize ALL "Trend Fact" bullet points** into a
          smooth, introductory paragraph.
    
    3.  **Scientific Deep-Dive (Science & Lab):**
        - You MUST **synthesize ALL "Science Fact" and "Lab Fact"
          bullet points** into a technical deep-dive section.
        - **EXCEPTION:** If "Science Fact (Abstracts)" is present, you MUST
          include the full `abstract_raw` text verbatim (do not summarize this).
    
    4.  **Traditional Wisdom (Culture):**
        - You MUST **synthesize ALL "Culture Fact" bullet points** into a
          coherent narrative about traditional wisdom.
        - DO NOT mention Ayurveda or TCM unless it is explicitly in a bullet point.
    
    5.  **Safety & Regulatory (CRITICAL):**
        - You MUST **synthesize ALL "Thai FDA Fact", "Safety Fact", and
          "Toxicity Fact" bullet points** into a clear regulatory and safety section.
        - If the sheet says "None found", you MUST report "None found".

    6.  **NEW: Strategic Analysis (from the Plan):**
        - **This is a new, critical section.**
        - You MUST **synthesize the ENTIRE `# ===STRATEGIC_PLAN===`** (from the
          `plan_task` context).
        - **Your synthesis MUST explicitly include all parts of the plan:**
            - **The "Market Opportunity" analysis.**
            - **The "Technical Feasibility" analysis.**
            - **The "Critical Constraints" (Safety/Toxicity) analysis.**
            - **The final "Strategic Recommendation".**
    
    7.  **Herbal Knowledge Summary (CRITICAL - REVISED):**
        - **This is a new, critical section.**
        - You MUST find the facts "Internal RAG Fact (Herbal)" and
          "Internal RAG Fact (Cultural)" from the MASTER_FACT_SHEET.
        - **Step A:** You MUST **translate any Thai text** (e.g., "ขมิ้นชัน")
          in these summaries into **100% English**.
        - **Step B:** You MUST **remove all inline technical citations**
          (e.g., "JSON: [...]", "PDF: [...]") from the text.
        - **Step C:** You MUST then include this **full, cleaned, English text**
          in the final article under a dedicated heading.
        - **FAILURE CHECK:** Do NOT summarize or rephrase the content.
          Your ONLY job is to Translate, Clean, and Copy.

    8.  **Reference Compilation (CRITICAL - VERBATIM COPY):**
        - Find the bullet point "**Science Fact (Abstracts):**" -> "citation_apa:".
        - Create a section called "# References".
        - You MUST copy the **EXACT VERBATIM STRING** from that "citation_apa"
          field. (If it says "not found", you MUST write "[1] not found").
    
    9.  **Source Compilation (CRITICAL - VERBATIM COPY):**
        - Find ALL bullet points starting with "**Source URL (...)**".
        - Create a **NEW** section called "# Sources Consulted".
        - You MUST copy **ONLY** these URLs.
        - Only include sources and references that contain actual data or URLs; exclude any entries that state 'None found' or 'not found', and do not use empty placeholders.
    
    10.  **Conclusion:** Write a final summary based on all synthesized facts.
    
    11. **Language:** The final article MUST be written in {lang}.

  expected_output: >
    A comprehensive, well-structured Markdown article that synthesizes all
    facts and strategies as per the workflow, written in {lang}.

    Final Answer:
    # <Title of the Article (e.g., {herbs_eng}: From Ancient Wisdom to Modern Strategy)>

    ## Herbal in Wellness Trends
    <A synthesized paragraph based on "Trend Facts" from the MASTER_FACT_SHEET.
    This section should be engaging and set the stage.>

    ## Scientific Deep-Dive
    <A synthesized section based on "Science Facts" and "Lab Facts".
    This section should be technical and factual.>
    
    > **Scientific Research:**
    > <The full, verbatim abstract_raw text from the Fact Sheet>

    ## Traditional Wisdom
    <A synthesized section based on "Culture Facts", presented as a
    flowing narrative or clear bullet points.>

    ## Safety, Regulatory, and Constraints
    <A synthesized section based on "Thai FDA Fact", "Safety Fact",
    and "Toxicity Fact" bullet points. This section MUST be clear
    and directly state all findings, including "None found".>

    ## Strategic Analysis and Product Opportunities
    <A synthesized section based on the # ===STRATEGIC_PLAN===.
    This section should discuss market opportunities and constraints.>

    ## Herbal Knowledge Summary
    <The full, cleaned text from "Internal RAG Fact (Herbal)" and
    "Internal RAG Fact (Cultural)">

    ## Conclusion
    <A final summary paragraph that concludes the entire article,
    balancing the facts with the strategic outlook.>

    # References
    [1] <The EXACT VERBATIM string from Fact Sheet's "citation_apa">

    # Sources Consulted
    [1] <URL 1 (copied EXACTLY from Fact Sheet's "Source URL (Trend)")>
    [2] <URL 2 (copied EXACTLY from Fact Sheet's "Source URL (Science)")>
    [3] <URL 3 (copied EXACTLY from Fact Sheet's "Source URL (Thai FDA)")>
    [4] <URL 4 (copied EXACTLY from Fact Sheet's "Source URL (Safety)")>
    [5] <URL 5 (copied EXACTLY from Fact Sheet's "Source URL (Toxicity)")>
    [6] <URL 6 (copied EXACTLY from Fact Sheet's "Source URL (Culture)")>
    (List ALL URLs found in the Fact Sheet)

  agent: writer_agent
  context:
    - consolidation_task
    - planner_task

audit_data_integrity_task:
  description: >
    ## Mission: Audit Data Integrity (Robustness & Clarity)
    1.  **Input:**
        - Read the **Master Fact Sheet** (Source of Truth) from `consolidation_task` (context[0]).
        - Read the **Final Article** (Candidate) from `write_article_task` (context[1]).
    
    2.  **Audit Robustness (Data Loss):**
        - Identify ALL critical facts in the Master Fact Sheet (context[0])
          (e.g., Science Facts, Compliance Facts, Culture Facts).
        - For **EVERY** fact, verify it is present in the Final Article (context[1]).
        - List any facts that were "Dropped".

    3.  **Audit Clarity (Hallucination & Handling):**
        - Identify ALL critical facts in the Final Article (context[1]).
        - Verify that **EVERY** fact originated from the Master Fact Sheet (context[0]).
        - List any facts that were "Hallucinated".
        - **Check "Not Found" Handling:** If the Fact Sheet states 
          `citation_apa: not_found`, verify the Article handles
          this correctly (e.g., writes "not found" or omits the reference) 
          and does NOT invent a citation.

    4.  **Output:** Report scores and lists of discrepancies.
  expected_output: >
    A Markdown report summarizing the audit.
    
    # ===AUDIT_DATA_INTEGRITY_REPORT===
    * **Collaboration Robustness (Data Loss):** <Score_6>%
    * **Explanation Clarity (Hallucination/Handling):** <Score_5>%
    * **Dropped Entities (Facts in Fact Sheet but not Article):** - <List of missing facts or 'None'>
    * **Hallucinated Entities (Facts in Article but not Fact Sheet):** - <List of invented facts or 'None'>
    * **Feedback:** <Brief justification for the scores>

  agent: qa_auditor_agent
  context:
    - consolidation_task
    - write_article_task

audit_strategy_task:
  description: >
    ## Mission: Audit Strategy (Efficacy & Feasibility)
    1.  **Input:**
        - Read Trends Data from `analyze_trends_task` (context[0]).
        - Read Compliance Data from `check_compliance_task` (context[1]).
        - Read Safety Data from `find_safety_data_task` (context[2]).
        - Read the Final Article from `write_article_task` (context[3]).
    
    2.  **Audit Efficacy (Criterion 4 - Relevance):**
        - Compare the "Herbal in Wellness Trends" section of the Final Article 
          (context[3]) against the "Trend Facts" (context[0]).
        - **Question:** Does the article successfully synthesize the trends? 
          Is the final content relevant to the trends identified?
        - Assign a score (%).

    3.  **Audit Feasibility (Criterion 7 - Scalability):**
        - Review the "Safety, Regulatory, and Constraints" section of the 
          Final Article (context[3]).
        - **Question:** Did the writer agent successfully *use* the structured 
          data from the Compliance (context[1]) and Safety (context[2]) tasks? 
          Does this "split" of tasks seem like a scalable and efficient way 
          to gather data?
        - Assign a score (%).

    4.  **Output:** Report scores and provide a final "Go/No-Go" for publication.
  expected_output: >
    A Markdown report summarizing the strategic audit.
    
    # ===AUDIT_STRATEGY_REPORT===
    * **Practical Efficacy (Relevance):** <Score_4>%
    * **Implementation Feasibility (Scalability):** <Score_7>%
    * **Go/No-Go for Publication:** <Go / No-Go>
    * **Feedback:** <Brief justification for the scores and decision>

  agent: content_strategist_agent
  context:
    - analyze_trends_task
    - check_compliance_task
    - find_safety_data_task
    - write_article_task

