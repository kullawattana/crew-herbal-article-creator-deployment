      * **Culture Fact (Processing - <CommunityName>):** <processing_method and description_quote>
      * **Culture Fact (Source - <CommunityName>):** <source_url>

      - Do NOT merge communities together.  
      - Do NOT omit any community.  
      - If 3 communities are found → output all 3 sets.  
      - If more are found → output all of them in the same format.

    * **Internal RAG Fact (Herbal):** <Full summary text from HERBAL_INTERNAL_SUMMARY>
    * **Internal RAG Fact (Cultural):** <Full summary text from CULTURAL_INTERNAL_SUMMARY>

    * **Source URL (Trend):** <The exact canonical URL of the GWI article 1>
