    * **Market Opportunity:** <Analyze Trend Facts (e.g., sales growth, specific trends)>
    * **Technical Feasibility:** <Analyze Lab Facts (e.g., viable compounds, extraction methods)>
    * **Critical Constraints (Safety/Toxicity):** <Analyze Toxicity/Safety Facts
