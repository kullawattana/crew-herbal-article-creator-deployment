translation_and_synthesis_culture_task:
  description: >
    ## 1. Mission: Critical Translation and Synthesis (The Final Editor)
    Your mission is to receive the **RAW THAI Markdown data** from the previous task, perform the necessary **CRITICAL TRANSLATION** and **SYNTHESIS**, and compile the final **100% English structured Markdown report**. **The final output MUST STIRCTLY MATCH THE REQUIRED FINAL ANSWER FORMAT.**

    ## 2. Workflow
    1.  **Input:** Receive the full Thai Markdown buffer from the `raw_extraction_task` (context[0]).
    2.  **Critical Translation (Facts):** Translate **EVERY single piece of Thai text** for ALL Fact Entities (e.g., community_name, context_quote) into **100% English**.
    3.  **Synthesize Narratives (English):**
        - Read the `full_thai_narrative_context` (Thai).
        - **SYNTHESIZE** the 5 Narrative Entities (e.g., community_highlight, name_etymology) into a **100-150 word summary** **directly in English**. Use the 'No herbal-related information found' placeholder when necessary.
    4.  **Final Compilation (STRICT FORMATTING):** Compile the final report:
        - The structure **MUST exactly match the expected_output below**.
        - **REMOVE** the `full_thai_narrative_context` field.
        - **ADD** the new `community_profile_summaries` (5 English summaries).
        - **ALL** string values MUST be 100% English.

    ## 3. Output Guardrails (CRITICAL)
    - **ENGLISH-ONLY RULE (STRICT):** The final Markdown output MUST be entirely in English.
    - **KEY COMPLETENESS:** ALL keys listed in the expected output MUST be present (including all 5 summary keys and all 3 specific entity list keys).
    - **FINAL OUTPUT:** The Final Answer MUST be the structured Markdown text block.
  expected_output: >
    The output MUST be a single Markdown text block that is 100% English and strictly matches the requested format.
    
    Final Answer:
    # ===CULTURE_DATA===
    ## Cultural Context for: <English name (Thai name)>
    
    ### Finding 1
