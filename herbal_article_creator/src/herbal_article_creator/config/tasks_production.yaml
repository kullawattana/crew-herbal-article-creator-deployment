consolidation_task:
  description: >
    ## Mission: Consolidate ALL Facts
    Your SOLE mission is to read the 9 structured Markdown reports provided in the context (Trends, lab, Research, FDA, Culture) and create ONE single
    "Master Fact Sheet".

    ## Workflow (CRITICAL)
    1.  **Read Contexts:** Read all 9 Markdown reports:
        - `# ===TRENDS_DATA===`
        - `# ===LAB_DATA===`
        - `# ===RESEARCH_DATA===`
        - `# ===COMPLIANCE_DATA===`
        - `# ===SAFETY_DATA===`
        - `# ===TOXICITY_DATA===`
        - `# ===CULTURE_DATA===`
        - `# ===HERBAL_INTERNAL_SUMMARY===`
        - `# ===CULTURAL_INTERNAL_SUMMARY===`
    2.  **Iterate and Extract:** Go through every single key-value pair in all 9 reports.
    3.  **Consolidate (FLATTEN):** Convert EVERY important piece of data into a **single, flat bullet point** in your output.
    4.  **MANDATORY INCLUSION:** You MUST extract the following specific facts:
        - **(Science):** Include for each selected study (aim for 3-5):
          - `abstract_raw`: the **full, verbatim** abstract from PubMed XML.
            - If multiple `<AbstractText>` sections exist, **join with line breaks** in original order.
            - **Do not** summarize, rewrite, or truncate.
          - `citation_apa`: the APA-style citation from metadata for the **same study**
            (if unavailable, write `"not found"`).
        - **(Compliance):** The exact status for FDA registrations (e.g., "None found").
        - **(Culture):** The specific community names (e.g., "Ban Dong Bang") and traditional uses (e.g., "Relieve stomach pain").
        - **(Trends):** The key summaries (e.g., "superfood lattes").
        - **(Source URLs):** You MUST extract EVERY `source_url` and `canonical_url` found in all 9 reports.
    
    ## Guardrails
    - **DO NOT WRITE THE ARTICLE.** Do not write prose, introductions, or conclusions.
    - Your **ONLY** job is to create a flat bulleted list of facts.
    - The output MUST start with `# ===MASTER_FACT_SHEET===`.
    - For each Finding in `# ===TRENDS_DATA===`, extract the full `wellness_context_summary` as a **Trend Fact**.
      Do **NOT** summarize, shorten, paraphrase, reorganize, or rewrite the text in any way.

  expected_output: >
    A single, flat Markdown file containing ONLY bullet points of facts extracted from the 9 context tasks.

    Final Answer:
    # ===MASTER_FACT_SHEET===
    ## Consolidated Facts for: <Herb Name>

    * **Trend Fact:** <Full summary text from TRENDS_DATA Finding 1>
    * **Trend Fact:** <Full summary text from TRENDS_DATA Finding 2>
    * **Lab Fact (Experimental Method):** <experimental_methods from LAB_DATA>
    * **Lab Fact (Extraction Method):** <extraction_methods from LAB_DATA>
    * **Lab Fact (Compound Identified):** <identified_compounds from LAB_DATA>
    * **Lab Fact (Chromatography - TLC):** <chromatography_details from LAB_DATA>
    * **Lab Fact (Pharmacological Finding):** <pharmacological_findings from LAB_DATA>
    * **Lab Fact (Cosmetic or Clinical Effect):** <cosmetic_or_clinical_snippets from LAB_DATA>
    * **Lab Fact (Quality Control):** <quality_control_observations from LAB_DATA>
    
    * **Science Fact (Herb):** <herb_name_scientific from RESEARCH_DATA>
    * **Science Fact (Compound):** <compound_name from RESEARCH_DATA>
    * **Science Fact (Abstracts):**
      * **Study 1:**
        * **abstract_raw:** <full verbatim abstract from RESEARCH_DATA>
        * **citation_apa:** <citation_apa from RESEARCH_DATA>
      * **Study 2:**
        * **abstract_raw:** <...>
        * **citation_apa:** <...>
      * **Study 3:**
        * **abstract_raw:** <...>
        * **citation_apa:** <...>
      * **Study 4:** (optional)
        * **abstract_raw:** <...>
        * **citation_apa:** <...>
      * **Study 5:** (optional)
        * **abstract_raw:** <...>
        * **citation_apa:** <...>
    
    * **Compliance Fact (Food Registration 1):** registration_number=<...>, product_name=<...>, company_name=<...>, status=<...>
    * **Compliance Fact (Food Registration 2):** ...
    * (If empty: * Compliance Fact (Food): None found.)
    * **Compliance Fact (Safety Dosage):** <Dosage found in COMPLIANCE_DATA or 'Not found'>
    * **Compliance Fact (Safety Warning):** <Warning subject: ..., date: ... or 'None found'>

    * **Safety Fact (Active Ingredient):** <active_ingredients from SAFETY_DATA>
    * **Safety Fact (Ingredient Purpose):** <active_ingredients from SAFETY_DATA>
    * **Safety Fact (Uses):** <Full text from 'Uses' section...>
    * **Safety Fact (Warnings):** <Full text from 'Warnings' section...>
    * **Safety Fact (Directions):** <Full text from 'Directions' section...>
    * **Safety Fact (Other Info):** <Full text from 'Other information' section...>
    * **Safety Fact (Inactive Ingredients):** <Full text from 'Inactive Ingredients' section...>
    * **Safety Fact (Questions):** <Full text from 'Questions?' section...>

    * **Toxicity Fact (Summary):** <200 word summary from TOXICITY_DATA>
    * **Toxicity Fact (Mechanism):** <mechanism_of_injury from TOXICITY_DATA>
    * **Toxicity Fact (Side Effects):** <reported_side_effects from TOXICITY_DATA>
    * **Toxicity Fact (Case Reports):** <case_report_summary from TOXICITY_DATA>

    * **Culture Fact:** Include EVERY cultural fact from ALL communities found in the context. 
      For each community, generate flat bullet points tagged with its community name, such as:

      * **Culture Fact (Community - <CommunityName>):** <community_name>
      * **Culture Fact (Location - <CommunityName>):** <location>
      * **Culture Fact (Ethnic Group - <CommunityName>):** <ethnic_group>
