    * **specific_entities:**
        * **local_names:**
            * **Item 1:**
                * **name:** <ชื่อท้องถิ่นภาษาไทย>
                * **context_quote:** <ประโยคภาษาไทยที่ยกมา>
        * **traditional_uses:**
            * **Item 1:**
